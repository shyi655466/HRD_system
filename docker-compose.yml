# 常驻：MySQL + Redis + Celery Worker + Django Web（Gunicorn）
# 使用方式（在仓库根目录）:
#   docker compose build
#   docker compose up -d
# API（与 frontend/vite.config.js 代理一致）: http://127.0.0.1:8010/
# 宿主机连接数据库: 127.0.0.1:33061
#
# 按需启用 Nginx + 前端静态（同域 /api，无需改 axios baseURL）:
#   cd frontend && npm ci && npm run build
#   docker compose --profile frontend up -d
# 浏览器访问 http://127.0.0.1:8080/ ；未启用 profile 时不启动 nginx 容器
#
# Web / Worker 默认挂载 ./pipeline → /app/pipeline；分析任务需 ref/FASTQ 在容器内可用，
# 可再增加 volumes 或设置 HRD_WGS_REF_FA 等。settings 中 HRD_ALLOWED_IMPORT_ROOTS 仍为代码内默认时，
# 导入校验路径需与挂载一致或后续改为环境变量。
#
# 首次建库表:
#   docker compose run --rm web python manage.py migrate
# 创建超管（可选）:
#   docker compose run --rm web python manage.py createsuperuser

x-backend-build: &backend_build
  context: .
  dockerfile: Dockerfile.backend

x-backend-image: &backend_image hrd_system-backend:latest

services:
  db:
    image: mysql:8.0
    restart: unless-stopped
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    environment:
      MYSQL_DATABASE: hrd_db
      MYSQL_USER: hrd_app
      MYSQL_PASSWORD: hrd_app_change_me
      MYSQL_ROOT_PASSWORD: root_change_me
    ports:
      - "33061:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test:
        [
          "CMD",
          "mysqladmin",
          "ping",
          "-h",
          "127.0.0.1",
          "-uroot",
          "-proot_change_me",
        ]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 25s

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"

  web:
    build: *backend_build
    image: *backend_image
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    ports:
      - "8010:8000"
    environment:
      DJANGO_DEBUG: "true"
      DJANGO_SECRET_KEY: django-insecure-docker-compose-dev-only
      DJANGO_ALLOWED_HOSTS: 127.0.0.1,localhost,web
      MYSQL_HOST: db
      MYSQL_PORT: "3306"
      MYSQL_DATABASE: hrd_db
      MYSQL_USER: hrd_app
      MYSQL_PASSWORD: hrd_app_change_me
      MYSQL_UNIX_SOCKET: ""
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      HRD_PIPELINE_ROOT: /app/pipeline
      HRD_PIPELINE_WORK_ROOT: /app/pipeline/work
    volumes:
      - ./pipeline:/app/pipeline
    working_dir: /app/backend

  nginx:
    image: nginx:alpine
    profiles: ["frontend"]
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./frontend/dist:/usr/share/nginx/html:ro
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - web

  worker:
    image: *backend_image
    build: *backend_build
    restart: unless-stopped
    command: ["celery", "-A", "backend", "worker", "-l", "info"]
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      DJANGO_DEBUG: "true"
      DJANGO_SECRET_KEY: django-insecure-docker-compose-dev-only
      DJANGO_ALLOWED_HOSTS: 127.0.0.1,localhost,web
      MYSQL_HOST: db
      MYSQL_PORT: "3306"
      MYSQL_DATABASE: hrd_db
      MYSQL_USER: hrd_app
      MYSQL_PASSWORD: hrd_app_change_me
      MYSQL_UNIX_SOCKET: ""
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      HRD_PIPELINE_ROOT: /app/pipeline
      HRD_PIPELINE_WORK_ROOT: /app/pipeline/work
    volumes:
      - ./pipeline:/app/pipeline
    working_dir: /app/backend

volumes:
  mysql_data:
